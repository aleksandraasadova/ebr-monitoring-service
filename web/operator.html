<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iObserve — Оператор</title>
  
  <!-- Подключаем модуль аутентификации -->
  <script src="js/auth.js"></script>
  
  <!-- Ранняя проверка: если не оператор — редирект на логин -->
  <script>
    if (!Auth.isLoggedIn() || Auth.getRole() !== 'operator') {
      window.location.replace('/');
    }
  </script>
  
  <style>
    /* Базовые стили */
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      padding: 40px; 
      background: linear-gradient(135deg, #1e3a5f 0%, #0f1e3d 100%); 
      color: #fff; 
      min-height: 100vh;
      margin: 0;
    }
    
    /* Карточка профиля */
    .card { 
      background: #fff; 
      color: #1e293b; 
      padding: 32px; 
      border-radius: 12px; 
      max-width: 500px; 
      margin: 40px auto; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    
    .card h1 { 
      margin-top: 0; 
      color: #1e293b; 
      font-size: 1.5rem;
      border-bottom: 2px solid #e2e8f0; 
      padding-bottom: 16px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      color: #64748b;
      font-weight: 500;
    }
    
    .info-value {
      font-weight: 600;
      color: #1e293b;
    }
    
    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #3b82f6;
      color: white;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    
    /* Кнопки */
    .btn { 
      width: 100%;
      margin-top: 24px; 
      padding: 12px 20px; 
      background: #ef4444; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: #dc2626;
    }
    
    .btn:active {
      transform: translateY(1px);
    }
    
    /* Статус сессии */
    .status {
      margin-top: 16px;
      padding: 12px;
      background: #f0f9ff;
      border-left: 4px solid #3b82f6;
      border-radius: 4px;
      font-size: 0.875rem;
      color: #0c4a6e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>👤 Панель оператора</h1>
    
    <div class="info-row">
      <span class="info-label">ФИО:</span>
      <span class="info-value" id="user-fullname">Загрузка...</span>
    </div>
    
    <div class="info-row">
      <span class="info-label">Код сотрудника:</span>
      <span class="info-value" id="user-code">...</span>
    </div>
    
    <div class="info-row">
      <span class=" info-label">Логин:</span>
      <span class="info-value" id="user-login">...</span>
    </div>
    
    <div class="info-row">
      <span class="info-label">Роль:</span>
      <span><span class="role-badge">operator</span></span>
    </div>
    
    <div class="status">
      ✅ Сессия активна. Вы можете регистрировать партии и контролировать процесс.
    </div>
    
    <button class="btn" onclick="Auth.logout()">🚪 Выйти из системы</button>
  </div>

  <!-- Инициализация данных после загрузки страницы -->
  <script>
    // Дополнительная проверка через утилиту Auth (если она есть в auth.js)
    if (typeof Auth !== 'undefined' && Auth.requireRole) {
      Auth.requireRole('operator');
    }

    // Заполняем данные из токена / хранилища
    document.getElementById('user-fullname').textContent = Auth.getFullName() || '—';
    document.getElementById('user-code').textContent = Auth.getUserCode() || '—';
    document.getElementById('user-login').textContent = Auth.getUserName() || '—';
  </script>
</body>
</html>
